name: Deploy Project
on:
  push:
    branches:
    - main
    - feature/*
    - test/*
  pull_request:
    types: [closed]
    branches:
    - main
  delete:
    branches-ignore: [main]

env:
  GH_HEAD_REF: ${{ github.head_ref }}
  GH_REF: ${{ github.ref_name }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'push'
    name: Deploy Project
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install outerbounds ob-project-utils

    - name: Configure Outerbounds
      run: |
        outerbounds service-principal-configure \
          --from-obproject-toml \
          --github-actions

    - name: Deploy Project
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMENTS_URL: ${{ github.event.pull_request.comments_url }}
        PYTHONUNBUFFERED: 1
      run: obproject-deploy

  # ── Promote + Teardown ──────────────────────────────────────────────
  # On PR merge: promote feature branch assets to main, then tear down
  # the feature branch. This preserves the model weights / data pointers
  # on main so they survive branch deletion.
  #
  # On branch delete (without PR): just teardown, no promotion.

  promote-and-teardown:
    needs: deploy
    if: >
      always() &&
      ((github.event_name == 'delete') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true))
    name: Promote & Teardown Branch
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install outerbounds ob-project-utils

    - name: Configure Outerbounds
      run: |
        outerbounds service-principal-configure \
          --from-obproject-toml \
          --github-actions

    - name: Promote assets to main
      if: github.event_name == 'pull_request'
      run: |
        SOURCE=${{ github.head_ref }}
        TARGET=${{ github.event.pull_request.base.ref }}
        PROJECT=$(python3 -c "
        try:
            import tomllib
        except ImportError:
            import toml as tomllib
        print(tomllib.load(open('obproject.toml','rb'))['project'])
        ")
        echo "Promoting assets: $PROJECT/$SOURCE -> $PROJECT/$TARGET"
        python3 -c "
        from obproject.assets import promote_assets
        result = promote_assets('$PROJECT', source='$SOURCE', target='$TARGET', with_aliases=True)
        for p in result['promoted']:
            print(f'  Promoted {p[\"kind\"]}/{p[\"name\"]}')
        for e in result['errors']:
            print(f'  Error {e[\"kind\"]}/{e.get(\"name\", \"?\")}: {e[\"error\"]}')
        if result['errors']:
            raise SystemExit(1)
        "

    - name: Teardown branch resources
      run: |
        BRANCH=${{ github.head_ref || github.event.ref }}
        PROJECT=$(python3 -c "
        try:
            import tomllib
        except ImportError:
            import toml as tomllib
        print(tomllib.load(open('obproject.toml','rb'))['project'])
        ")
        echo "Tearing down $PROJECT/$BRANCH"
        outerbounds flowproject teardown-branch \
          --id "$PROJECT/$BRANCH" --yes -o json
